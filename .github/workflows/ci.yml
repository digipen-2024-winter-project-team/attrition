name: CI Pipeline

env:
  unity_version: 6000.0.30f1
  target_platform: StandaloneWindows64
  build_output_path: Build/
  coverage_output_path: CodeCoverage/
  test_results_output_path: TestResults/

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Unity Project
      uses: game-ci/unity-builder@v2.0.0
      with:
        unityVersion: ${{ env.unity_version }}
        targetPlatform: ${{ env.target_platform }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Build
        path: ${{ env.build_output_path }}

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Unity Tests
      uses: game-ci/unity-test-runner@v2.0.0
      with:
        unityVersion: ${{ env.unity_version }}
        resultOutputPath: ${{ env.test_results_output_path }}

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      with:
        name: Test Results
        path: ${{ env.test_results_output_path }}

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate Code Coverage Report
      uses: game-ci/unity-test-runner@v2.0.0
      with:
        unityVersion: ${{ env.unity_version }}
        coverage: true

    - name: Upload Code Coverage Report
      uses: actions/upload-artifact@v3
      with:
        name: Code Coverage Report
        path: ${{ env.coverage_output_path }}
